  <!-- 船舱 -->
  <rect x="35" y="45" width="15" height="8" fill="#667eea" opacity="0.8"/>
  <rect x="55" y="45" width="15" height="8" fill="#667eea" opacity="0.8"/>
  
  <!-- 波浪 -->
  <path d="M 0 70 Q 10 65 20 70 T 40 70 T 60 70 T 80 70 T 100 70" 
        fill="none" stroke="#4a9eff" stroke-width="2" opacity="0.6"/>
  <path d="M 0 75 Q 10 70 20 75 T 40 75 T 60 75 T 80 75 T 100 75" 
        fill="none" stroke="#4a9eff" stroke-width="2" opacity="0.4"/>
