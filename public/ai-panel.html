<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoubleBoat AI 控制面板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .panel {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .panel h2 { margin-bottom: 15px; color: #00d4ff; }
    
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
    }
    .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #fff; }
    .btn-preset { background: linear-gradient(135deg, #7b2ff7, #5a1fd1); color: #fff; }
    .btn-action { background: linear-gradient(135deg, #00cc99, #009973); color: #fff; }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
    
    textarea {
      width: 100%;
      height: 80px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      font-size: 14px;
      resize: vertical;
    }
    
    .result {
      background: rgba(0,0,0,0.4);
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      font-family: monospace;
      font-size: 13px;
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .status { display: flex; gap: 20px; margin-bottom: 15px; }
    .status-item { 
      background: rgba(0,0,0,0.2); 
      padding: 8px 15px; 
      border-radius: 20px;
      font-size: 14px;
    }
    .status-item span { color: #00d4ff; }
    
    .scene-display {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }
    .scene-item {
      background: rgba(0,0,0,0.2);
      padding: 12px;
      border-radius: 8px;
    }
    .scene-item h4 { color: #7b2ff7; margin-bottom: 8px; }
    .scene-item p { font-size: 13px; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚤 DoubleBoat AI 控制面板</h1>
    
    <div class="panel">
      <h2>🔌 服务状态</h2>
      <div class="status">
        <div class="status-item">服务: <span id="serviceStatus">检查中...</span></div>
        <div class="status-item">模型: <span id="modelStatus">-</span></div>
        <div class="status-item">MCP: <span id="mcpStatus">-</span></div>
      </div>
    </div>

    <div class="panel">
      <h2>🎨 场景预设</h2>
      <div class="btn-group">
        <button class="btn-preset" onclick="applyPreset('calm')">平静海面</button>
        <button class="btn-preset" onclick="applyPreset('stormy')">暴风雨</button>
        <button class="btn-preset" onclick="applyPreset('sunset')">日落</button>
        <button class="btn-preset" onclick="applyPreset('night')">夜晚</button>
        <button class="btn-action" onclick="resetScene()">重置场景</button>
      </div>
    </div>

    <div class="panel">
      <h2>🔧 MCP 工具</h2>
      <div class="btn-group">
        <button class="btn-primary" onclick="generateScene('calm')">平静场景</button>
        <button class="btn-primary" onclick="generateScene('stormy')">暴风雨场景</button>
        <button class="btn-primary" onclick="generateScene('sunset')">日落场景</button>
        <button class="btn-primary" onclick="generateScene('night')">夜晚场景</button>
      </div>
      <div class="btn-group">
        <button class="btn-action" onclick="adjustPhysics({gravity: -5})">低重力</button>
        <button class="btn-action" onclick="adjustPhysics({waterDensity: 500})">低密度</button>
        <button class="btn-action" onclick="adjustPhysics({linearDamping: 0.5})">高阻尼</button>
        <button class="btn-action" onclick="adjustLighting({ambientIntensity: 0.1})">暗环境</button>
      </div>
    </div>

    <div class="panel">
      <h2>💬 AI 对话</h2>
      <textarea id="aiMessage" placeholder="输入你的请求，比如：'把波浪调大一点' 或 '切换到日落场景'"></textarea>
      <div class="btn-group" style="margin-top: 10px;">
        <button class="btn-primary" onclick="sendChat()">发送请求</button>
      </div>
    </div>

    <div class="panel">
      <h2>📊 当前场景</h2>
      <div class="scene-display" id="sceneDisplay">
        <div class="scene-item"><h4>加载中...</h4></div>
      </div>
    </div>

    <div class="panel">
      <h2>📝 执行结果</h2>
      <div class="result" id="result">等待操作...</div>
    </div>
  </div>

  <script src="ai-controller.js"></script>
  <script>
    const API = 'http://localhost:3001';
    
    // 初始化
    async function init() {
      try {
        const health = await fetch(`${API}/api/health`).then(r => r.json());
        document.getElementById('serviceStatus').textContent = health.status === 'ok' ? '🟢 在线' : '🔴 离线';
        document.getElementById('modelStatus').textContent = health.model;
        document.getElementById('mcpStatus').textContent = health.mcp === 'enabled' ? '🟢 已启用' : '🔴 禁用';
        await refreshScene();
      } catch (e) {
        document.getElementById('serviceStatus').textContent = '🔴 离线';
        showResult('错误: ' + e.message);
      }
    }
    
    async function refreshScene() {
      const scene = await window.aiController.getSceneStatus();
      const display = document.getElementById('sceneDisplay');
      display.innerHTML = `
        <div class="scene-item"><h4>🌊 海洋</h4><p>波浪: ${scene.ocean.waveHeight}m<br>速度: ${scene.ocean.waveSpeed}<br>颜色: ${scene.ocean.waterColor}</p></div>
        <div class="scene-item"><h4>⚙️ 物理</h4><p>重力: ${scene.physics.gravity}<br>密度: ${scene.physics.waterDensity}<br>阻尼: ${scene.physics.linearDamping}</p></div>
        <div class="scene-item"><h4>🚤 船1</h4><p>位置: (${scene.boats.boat1.position.x}, ${scene.boats.boat1.position.y}, ${scene.boats.boat1.position.z})</p></div>
        <div class="scene-item"><h4>🚤 船2</h4><p>位置: (${scene.boats.boat2.position.x}, ${scene.boats.boat2.position.y}, ${scene.boats.boat2.position.z})</p></div>
      `;
    }
    
    function showResult(msg) {
      document.getElementById('result').textContent = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
    }
    
    async function applyPreset(preset) {
      const result = await window.aiController.applyPreset(preset);
      showResult(result);
      await refreshScene();
    }
    
    async function generateScene(type) {
      const result = await window.aiController.generateScene(type);
      showResult(result);
      await refreshScene();
    }
    
    async function resetScene() {
      const result = await window.aiController.resetScene();
      showResult(result);
      await refreshScene();
    }
    
    async function adjustPhysics(params) {
      const result = await window.aiController.adjustPhysics(params);
      showResult(result);
      await refreshScene();
    }
    
    async function adjustLighting(params) {
      const result = await window.aiController.adjustLighting(params);
      showResult(result);
      await refreshScene();
    }
    
    async function sendChat() {
      const msg = document.getElementById('aiMessage').value;
      if (!msg) return alert('请输入消息');
      
      showResult('AI 处理中...');
      const result = await window.aiController.chat(msg);
      showResult(result);
      await refreshScene();
    }
    
    // 回车发送
    document.getElementById('aiMessage').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });
    
    init();
  </script>
</body>
</html>
