<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poseidon-X 诊断工具</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #eee;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 {
      text-align: center;
      background: linear-gradient(90deg, #00d4ff, #7b2ff7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .card h2 {
      color: #00d4ff;
      margin-top: 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      margin: 10px 0;
    }
    .status.success { background: rgba(0,204,153,0.2); border-left: 4px solid #00cc99; }
    .status.error { background: rgba(255,68,68,0.2); border-left: 4px solid #ff4444; }
    .status.warning { background: rgba(255,170,0,0.2); border-left: 4px solid #ffaa00; }
    .status.info { background: rgba(0,212,255,0.2); border-left: 4px solid #00d4ff; }
    pre {
      background: rgba(0,0,0,0.3);
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }
    button {
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
    .metric {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .metric:last-child { border-bottom: none; }
    .metric-label { color: #aaa; }
    .metric-value { color: #00d4ff; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Poseidon-X 诊断工具</h1>
    
    <div class="card">
      <h2>📦 LocalStorage 配置</h2>
      <div id="localStorage-status"></div>
    </div>
    
    <div class="card">
      <h2>🧠 LLM 配置</h2>
      <div id="llm-status"></div>
    </div>
    
    <div class="card">
      <h2>🔌 API 测试</h2>
      <button onclick="testLLMConnection()">测试 LLM 连接</button>
      <div id="test-result"></div>
    </div>
    
    <div class="card">
      <h2>📋 诊断报告</h2>
      <pre id="diagnostic-report">点击"运行诊断"按钮...</pre>
      <button onclick="runDiagnostics()">运行诊断</button>
      <button onclick="clearConfig()">清除配置</button>
    </div>
  </div>

  <script>
    function loadConfig() {
      const saved = localStorage.getItem('poseidon_config');
      if (saved) {
        try {
          return JSON.parse(saved);
        } catch (e) {
          console.error('解析配置失败:', e);
          return null;
        }
      }
      return null;
    }

    function displayLocalStorage() {
      const config = loadConfig();
      const container = document.getElementById('localStorage-status');
      
      if (!config) {
        container.innerHTML = `
          <div class="status error">
            <span>❌</span>
            <span>未找到 Poseidon 配置，请先访问 poseidon-config.html 进行配置</span>
          </div>
        `;
        return;
      }
      
      container.innerHTML = `
        <div class="status success">
          <span>✅</span>
          <span>配置已保存</span>
        </div>
        <div class="metric"><span class="metric-label">LLM Provider</span><span class="metric-value">${config.llmProvider || '未设置'}</span></div>
        <div class="metric"><span class="metric-label">API Endpoint</span><span class="metric-value">${config.apiEndpoint || '未设置'}</span></div>
        <div class="metric"><span class="metric-label">Model</span><span class="metric-value">${config.model || '未设置'}</span></div>
        <div class="metric"><span class="metric-label">API Key</span><span class="metric-value">${config.apiKey ? '***' + config.apiKey.slice(-4) : '未设置'}</span></div>
        <div class="metric"><span class="metric-label">配置时间</span><span class="metric-value">${new Date().toLocaleString()}</span></div>
      `;
    }

    function displayLLMStatus() {
      const config = loadConfig();
      const container = document.getElementById('llm-status');
      
      if (!config || !config.apiKey) {
        container.innerHTML = `
          <div class="status error">
            <span>❌</span>
            <span>API Key 未配置</span>
          </div>
        `;
        return;
      }
      
      const providerInfo = {
        'deepseek': { name: 'DeepSeek', endpoint: 'https://api.deepseek.com/v1', models: ['deepseek-chat', 'deepseek-reasoner'] },
        'minimax': { name: 'MiniMax', endpoint: 'https://api.minimax.chat/v1', models: ['MiniMax-M2.5'] },
        'openai': { name: 'OpenAI', endpoint: 'https://api.openai.com/v1', models: ['gpt-4', 'gpt-3.5-turbo'] }
      };
      
      const provider = providerInfo[config.llmProvider] || { name: config.llmProvider };
      
      container.innerHTML = `
        <div class="status success">
          <span>✅</span>
          <span>${provider.name} 配置正确</span>
        </div>
        <div class="metric"><span class="metric-label">Provider</span><span class="metric-value">${config.llmProvider}</span></div>
        <div class="metric"><span class="metric-label">Endpoint</span><span class="metric-value">${config.apiEndpoint}</span></div>
        <div class="metric"><span class="metric-label">Model</span><span class="metric-value">${config.model}</span></div>
      `;
    }

    async function testLLMConnection() {
      const config = loadConfig();
      const resultDiv = document.getElementById('test-result');
      
      if (!config || !config.apiKey) {
        resultDiv.innerHTML = `
          <div class="status error">
            <span>❌</span>
            <span>请先配置 API Key</span>
          </div>
        `;
        return;
      }
      
      resultDiv.innerHTML = '<div class="status info">⏳ 测试中...</div>';
      
      try {
        const response = await fetch(config.apiEndpoint + '/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${config.apiKey}`
          },
          body: JSON.stringify({
            model: config.model,
            messages: [{ role: 'user', content: '你好，请回复"测试成功"' }],
            max_tokens: 50
          })
        });
        
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || '无回复';
        
        resultDiv.innerHTML = `
          <div class="status success">
            <span>✅</span>
            <span>LLM 连接测试成功！</span>
          </div>
          <pre>回复：${reply}</pre>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="status error">
            <span>❌</span>
            <span>测试失败：${error.message}</span>
          </div>
        `;
      }
    }

    function runDiagnostics() {
      const config = loadConfig();
      const report = {
        timestamp: new Date().toISOString(),
        localStorage: !!localStorage.getItem('poseidon_config'),
        config: config ? {
          llmProvider: config.llmProvider,
          apiEndpoint: config.apiEndpoint,
          model: config.model,
          hasApiKey: !!config.apiKey,
          apiKeyLength: config.apiKey?.length || 0
        } : null,
        issues: []
      };
      
      if (!config) {
        report.issues.push('未配置 Poseidon 配置');
      } else if (!config.apiKey) {
        report.issues.push('API Key 未配置');
      } else if (!config.apiEndpoint) {
        report.issues.push('API Endpoint 未配置');
      } else if (!config.model) {
        report.issues.push('Model 未配置');
      }
      
      document.getElementById('diagnostic-report').textContent = JSON.stringify(report, null, 2);
    }

    function clearConfig() {
      if (confirm('确定要清除所有 Poseidon 配置吗？')) {
        localStorage.removeItem('poseidon_config');
        alert('配置已清除，请刷新页面重新配置。');
        location.reload();
      }
    }

    // 初始化
    displayLocalStorage();
    displayLLMStatus();
  </script>
</body>
</html>
