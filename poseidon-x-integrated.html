<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poseidon-X 完整集成版 | Software 3.0 + Digital Twin</title>
  <link rel="icon" type="image/svg+xml" href="./public/favicon.svg" />
  <link rel="stylesheet" href="./public/gui-enhancements.css" />
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0f1a;
      color: #e8f0ff;
      font-family: "Inter", "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    /* Poseidon-X 顶部标题栏 */
    #poseidon-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: rgba(11, 21, 37, 0.95);
      border-bottom: 2px solid #4fc3f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 200;
      backdrop-filter: blur(10px);
    }

    #poseidon-header h1 {
      font-size: 18px;
      color: #4fc3f7;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    #poseidon-header .status {
      display: flex;
      gap: 16px;
      font-size: 12px;
    }

    #poseidon-header .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #81c784;
      animation: pulse 2s infinite;
      margin-right: 4px;
      display: inline-block;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 300;
      animation: pulse-loading 2s ease-in-out infinite;
    }

    @keyframes pulse-loading {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .loading h2 {
      font-size: 28px;
      color: #4fc3f7;
      margin-bottom: 15px;
    }

    .loading p {
      font-size: 14px;
      color: #81c784;
    }

    .hide {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Poseidon-X 顶部标题栏 -->
  <div id="poseidon-header">
    <h1>
      <span style="font-size: 24px;">🌊</span>
      Poseidon-X 智能船舶系统
      <span style="font-size: 11px; color: #81c784; font-weight: normal; margin-left: 10px;">
        Software 3.0 + Digital Twin 完整集成版
      </span>
    </h1>
    <div class="status">
      <div style="display: flex; align-items: center;">
        <div class="status-dot"></div>
        <span id="system-status">系统初始化中...</span>
      </div>
      <div>
        <span id="agent-count">🤖 0 Agents</span>
      </div>
    </div>
  </div>

  <!-- 加载界面 -->
  <div id="loading" class="loading">
    <h2>🌊 Poseidon-X 初始化中...</h2>
    <p>正在加载智能船舶系统 + 3D 数字孪生</p>
    <p style="margin-top: 10px; font-size: 12px; color: #666;">
      AI Crew + Physics Engine + Weather System + Cabin Manager
    </p>
  </div>

  <!-- 3D 渲染容器 -->
  <div id="app"></div>

  <!-- 使用完整集成的 Demo 脚本 -->
  <script type="module" src="./src/poseidon-integrated-demo.js"></script>
</body>
</html>
