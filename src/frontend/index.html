<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoubleBoatClawSystem - 数字孪生平台</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #00d9ff; }
    .status { 
      padding: 20px;
      background: #16213e;
      border-radius: 8px;
      margin: 20px 0;
    }
    .status h2 { margin-top: 0; color: #00d9ff; }
    .ok { color: #4ade80; }
    .error { color: #f87171; }
    pre { 
      background: #0f3460;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>🚢 DoubleBoatClawSystem</h1>
  <p>深远海双体船智能信息系统 - 数字孪生平台</p>
  
  <div class="status">
    <h2>系统状态</h2>
    <div id="backend-status">检查后端服务...</div>
    <div id="channels-status" style="margin-top: 15px;">
      <h3>已注册 Channel</h3>
      <div id="channels-list">加载中...</div>
    </div>
  </div>

  <div class="status">
    <h2>后端 API</h2>
    <p>API 文档：<a href="http://localhost:8080/docs" style="color: #00d9ff;">http://localhost:8080/docs</a></p>
    <pre id="api-response">等待请求...</pre>
  </div>

  <script>
    async function checkBackend() {
      try {
        const response = await fetch('http://localhost:8080/api/v1/sensors');
        const data = await response.json();
        document.getElementById('backend-status').innerHTML = 
          `<p class="ok">✅ 后端服务正常 - ${data.sensors.length} 个传感器</p>`;
        document.getElementById('api-response').textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        document.getElementById('backend-status').innerHTML = 
          `<p class="error">❌ 后端服务不可用：${error.message}</p>`;
      }
    }

    async function checkChannels() {
      try {
        const response = await fetch('http://localhost:8080/api/v1/channels');
        const data = await response.json();
        if (data.channels && data.channels.length > 0) {
          document.getElementById('channels-list').innerHTML = 
            data.channels.map(ch => `<div>• ${ch.name} - ${ch.description || ''}</div>`).join('');
        } else {
          document.getElementById('channels-list').innerHTML = '<div>暂无已注册 Channel</div>';
        }
      } catch (error) {
        document.getElementById('channels-list').innerHTML = 
          `<div class="error">无法获取 Channel 列表</div>`;
      }
    }

    checkBackend();
    checkChannels();
  </script>
</body>
</html>
