<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poseidon-X - LLM 配置</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      color: #4fc3f7;
    }
    .subtitle {
      color: #888;
      margin-bottom: 40px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #4fc3f7;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #ccc;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #4fc3f7;
    }
    .btn {
      background: linear-gradient(135deg, #4fc3f7 0%, #2196f3 100%);
      color: #fff;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      margin-left: 10px;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      display: none;
    }
    .status.success {
      background: rgba(76,175,80,0.2);
      border: 1px solid #4caf50;
      color: #81c784;
    }
    .status.error {
      background: rgba(244,67,54,0.2);
      border: 1px solid #f44336;
      color: #ef5350;
    }
    .provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .provider-card {
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .provider-card:hover {
      background: rgba(0,0,0,0.3);
    }
    .provider-card.selected {
      border-color: #4fc3f7;
      background: rgba(79,195,247,0.1);
    }
    .provider-card h3 {
      font-size: 16px;
      margin-bottom: 4px;
    }
    .provider-card p {
      font-size: 12px;
      color: #888;
    }
    .test-result {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    .test-result.success {
      background: rgba(76,175,80,0.2);
      color: #81c784;
    }
    .test-result.error {
      background: rgba(244,67,54,0.2);
      color: #ef5350;
    }
    .nav-strip {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .nav-strip a {
      color: #b3e5fc;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(79,195,247,0.12);
      border: 1px solid rgba(79,195,247,0.2);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-strip">
      <a href="/captain-cockpit.html">返回船长智能中控台</a>
      <a href="/digital-twin.html">返回数字孪生驾驶台</a>
      <a href="/index.html">返回系统首页</a>
    </div>
    <h1>🌊 Poseidon-X 配置中心</h1>
    <p class="subtitle">配置 LLM 提供商、API 密钥和智能体参数</p>
    
    <div class="card">
      <h2>🧠 LLM 提供商选择</h2>
      <div class="provider-grid">
        <div class="provider-card selected" data-provider="minimax">
          <h3>MiniMax</h3>
          <p>MiniMax-M2.5 (推荐)</p>
        </div>
        <div class="provider-card" data-provider="deepseek">
          <h3>DeepSeek</h3>
          <p>DeepSeek-V3</p>
        </div>
        <div class="provider-card" data-provider="openai">
          <h3>OpenAI</h3>
          <p>GPT-4 Turbo</p>
        </div>
        <div class="provider-card" data-provider="local">
          <h3>本地模型</h3>
          <p>Ollama / LM Studio</p>
        </div>
      </div>
      
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="apiKey" placeholder="输入你的 API 密钥">
      </div>
      
      <div class="form-group">
        <label>API Endpoint</label>
        <input type="url" id="apiEndpoint" placeholder="https://api.minimax.chat/v1">
      </div>
      
      <div class="form-group">
        <label>模型名称</label>
        <input type="text" id="model" placeholder="MiniMax-M2.5">
      </div>
      
      <div class="form-group">
        <label>Temperature (创造性)</label>
        <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
        <div style="text-align: right; color: #888; font-size: 12px; margin-top: 4px;">
          <span id="temperatureValue">0.7</span>
        </div>
      </div>
      
      <button class="btn" onclick="testConnection()">🔌 测试连接</button>
      <button class="btn btn-secondary" onclick="saveConfig()">💾 保存配置</button>
      
      <div id="testStatus" class="status"></div>
    </div>
    
    <div class="card">
      <h2>🤖 智能体配置</h2>
      <div class="form-group">
        <label>系统提示词 (System Prompt)</label>
        <textarea id="systemPrompt" rows="6" placeholder="你是 Poseidon-X 船舶智能系统的核心 AI 助手..."></textarea>
      </div>
      
      <div class="form-group">
        <label>最大上下文长度 (tokens)</label>
        <input type="number" id="maxContext" value="128000">
      </div>
      
      <button class="btn" onclick="saveConfig()">💾 保存配置</button>
    </div>
    
    <div class="card">
      <h2>📊 当前配置</h2>
      <pre id="currentConfig" style="background: rgba(0,0,0,0.3); padding: 16px; border-radius: 8px; overflow-x: auto; font-size: 12px;"></pre>
    </div>
  </div>
  
  <script>
    let selectedProvider = 'minimax';
    
    const providerEndpoints = {
      'minimax': 'https://api.minimax.chat/v1',
      'deepseek': 'https://api.deepseek.com/v1',
      'openai': 'https://api.openai.com/v1',
      'local': 'http://localhost:11434/v1'
    };
    
    const providerModels = {
      'minimax': 'MiniMax-M2.5',
      'deepseek': 'deepseek-chat',
      'openai': 'gpt-4-turbo-preview',
      'local': 'llama2'
    };
    
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      loadConfig();
      setupProviderCards();
      setupTemperatureSlider();
    });
    
    function setupProviderCards() {
      document.querySelectorAll('.provider-card').forEach(card => {
        card.addEventListener('click', () => {
          document.querySelectorAll('.provider-card').forEach(c => c.classList.remove('selected'));
          card.classList.add('selected');
          selectedProvider = card.dataset.provider;
          
          document.getElementById('apiEndpoint').value = providerEndpoints[selectedProvider];
          document.getElementById('model').value = providerModels[selectedProvider];
        });
      });
    }
    
    function setupTemperatureSlider() {
      const slider = document.getElementById('temperature');
      const value = document.getElementById('temperatureValue');
      slider.addEventListener('input', () => {
        value.textContent = slider.value;
      });
    }
    
    function loadConfig() {
      try {
        const saved = localStorage.getItem('poseidon_config');
        if (saved) {
          const config = JSON.parse(saved);
          
          // 选择对应的提供商卡片
          document.querySelectorAll('.provider-card').forEach(c => {
            c.classList.toggle('selected', c.dataset.provider === config.llmProvider);
          });
          selectedProvider = config.llmProvider || 'minimax';
          
          document.getElementById('apiKey').value = config.apiKey || '';
          document.getElementById('apiEndpoint').value = config.apiEndpoint || providerEndpoints[selectedProvider];
          document.getElementById('model').value = config.model || providerModels[selectedProvider];
          document.getElementById('temperature').value = config.temperature || 0.7;
          document.getElementById('temperatureValue').textContent = config.temperature || 0.7;
          document.getElementById('systemPrompt').value = config.systemPrompt || '';
          document.getElementById('maxContext').value = config.maxContextTokens || 128000;
          
          showCurrentConfig(config);
        }
      } catch (error) {
        console.error('加载配置失败:', error);
      }
    }
    
    function saveConfig() {
      const config = {
        llmProvider: selectedProvider,
        apiKey: document.getElementById('apiKey').value,
        apiEndpoint: document.getElementById('apiEndpoint').value,
        model: document.getElementById('model').value,
        temperature: parseFloat(document.getElementById('temperature').value),
        systemPrompt: document.getElementById('systemPrompt').value,
        maxContextTokens: parseInt(document.getElementById('maxContext').value)
      };
      
      localStorage.setItem('poseidon_config', JSON.stringify(config));
      showCurrentConfig(config);
      
      showStatus('✅ 配置已保存！刷新页面后生效。', 'success');
      
      // 广播配置更新事件
      window.postMessage({ type: 'POSEIDON_CONFIG_UPDATED', config }, '*');
    }
    
    async function testConnection() {
      const status = document.getElementById('testStatus');
      status.style.display = 'block';
      status.className = 'status';
      status.textContent = '🔄 正在测试连接...';
      
      const config = {
        provider: selectedProvider,
        apiKey: document.getElementById('apiKey').value,
        apiEndpoint: document.getElementById('apiEndpoint').value,
        model: document.getElementById('model').value
      };
      
      try {
        // 简单的连接测试
        const response = await fetch(config.apiEndpoint, {
          method: 'OPTIONS',
          mode: 'cors'
        }).catch(() => ({ ok: true })); // 忽略 CORS 错误
        
        if (config.apiKey) {
          status.textContent = `✅ 连接测试成功！API Key 已配置 (${config.provider})`;
          status.className = 'status success';
        } else {
          status.textContent = '⚠️ API Key 未配置，请添加后重试';
          status.className = 'status error';
        }
      } catch (error) {
        status.textContent = `❌ 连接失败：${error.message}`;
        status.className = 'status error';
      }
    }
    
    function showCurrentConfig(config) {
      const display = {
        ...config,
        apiKey: config.apiKey ? '••••••' + config.apiKey.slice(-4) : '(未配置)'
      };
      document.getElementById('currentConfig').textContent = JSON.stringify(display, null, 2);
    }
    
    function showStatus(message, type) {
      const status = document.getElementById('testStatus');
      status.style.display = 'block';
      status.textContent = message;
      status.className = `status ${type}`;
      setTimeout(() => {
        status.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
